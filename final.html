<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday card</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <img src="images/ZUiY.gif" alt="stars" class="star" width="900px">
    <img src="images/5l03.gif" alt="ballon" class="ballon" width="900px">
    <div class="container">
        <div class="birthdayCard">
            <div class="cardFront">
                <div class="front-text">
                    <h3 class="happy">HAPPY</h3>
                    <h2 class="bday">BIRTHDAY</h2>
                    <h3 class="toyou">Developer!</h3>
                </div>
                <div class="wrap-deco">
                    <div class="decorations"></div>
                    <div class="decorationsTwo"></div>
                </div>
                <div class="wrap-decoTwo">
                    <div class="decorations"></div>
                    <div class="decorationsThree"></div>
                </div>
                <div class="plate">
                    <div class="cake"></div>
                    <div class="flame"></div>
                </div>
            </div>
            <div class="cardInside">
                <div class="img">
                    <img src="images/Soni.jpg" alt="Brotherpic" class="bdyboy">
                    <img src="images/6ob.gif" alt="confetti" class="confetti">
                </div>
                <div class="inside-text">
                    <h3 class="happy">HAPPY</h3>
                    <h2 class="bday">BIRTHDAY</h2>
                    <h3 class="toyou">to you!</h3>
                </div>
                <div class="wishes">
                    <p>Soni,</p>
                    <p>Here's to another year of friendship, laughter, and countless beautiful memories together. I hope your day is filled with lots of love and laughter! May all of your
                        birthday
                        wishes come true.</p>
            
                        <p class="name">Shan</p>
                    </div>
            </div>
        </div>
    </div>

    <img src="images/4SHX.gif" alt="cat" class="cat">
    
    
    <center><h2 color:"white">Zoom in, the magic is in details 😂</h2></center>
